# Nginx Load Balancer - File chinh
# Cac tinh nang tach trong thu muc features/

events {}

http {
    upstream he_thong_backend {
        include features/upstream.conf;   # Weighted RR + Health check + Backup
    }

    include features/rate-limit.conf;     # Rate limit zone (http level)

    server {
        listen 8080;

        location / {
            proxy_pass http://he_thong_backend;
            include features/proxy.conf;  # Proxy headers + No-cache

            # Rate limiting: gioi han request (burst 20, xu ly ngay)
            limit_req zone=one burst=20 nodelay;
        }
    }
}