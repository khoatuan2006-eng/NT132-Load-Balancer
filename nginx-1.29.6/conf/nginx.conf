# Nginx Load Balancer - File chinh
# Cac tinh nang tach trong thu muc features/

events {}

http {
    upstream he_thong_backend {
        include features/upstream.conf;   # Health check + Backup
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://he_thong_backend;
            include features/proxy.conf;  # Proxy headers + No-cache
        }
    }
}