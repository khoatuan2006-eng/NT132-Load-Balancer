# Weighted Round Robin + Passive Health Check + Backup Server
# (include boi nginx.conf → upstream he_thong_backend)

# # Weight: Server1 nhan gap 3 lan so voi Server2 (ti le 75/25)
# # Health Check: fail 3 lan → loai 30 giay → thu lai

# Backup: chi hoat dong khi 8001 va 8002 deu chet


# --- FILE: upstream.conf ---

 
    # THUẬT TOÁN: Chỉ bật 1 trong các dòng dưới đây
    
    least_conn;  # Tối ưu real-time: Thằng nào rảnh thì xử lý liền (Dùng để test Stress)
    # ip_hash;     # Sticky Session: Cố định khách hàng vào 1 server
    # (Để trống dòng này nếu muốn dùng Round Robin mặc định)

    # DANH SÁCH SERVER
    # Lưu ý: BẮT BUỘC phải có dấu ; ở cuối mỗi dòng
    server 127.0.0.1:8001 weight=3 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8002 weight=1 max_fails=3 fail_timeout=30s;
    
    # SERVER DỰ PHÒNG
    server 127.0.0.1:8003 backup;
