# Passive Health Check + Backup Server
# (include boi nginx.conf → upstream he_thong_backend)

# Health Check: fail 3 lan → loai 30 giay → thu lai
server 127.0.0.1:8001 max_fails=3 fail_timeout=30s;
server 127.0.0.1:8002 max_fails=3 fail_timeout=30s;

# Backup: chi hoat dong khi 8001 va 8002 deu chet
server 127.0.0.1:8003 backup;
