# Script kiểm tra HAProxy — nếu HAProxy chết thì nhường VIP cho BACKUP
vrrp_script chk_haproxy {
    script "/etc/keepalived/check_haproxy.sh"
    interval 2        # Kiểm tra mỗi 2 giây
    weight -20        # Nếu script fail → trừ 20 điểm priority
    fall 2
    rise 2
}

vrrp_instance VI_1 {       

    state BACKUP              # Máy dự phòng 
    interface enp0s8          # Card mạng

    virtual_router_id 51     
    priority 100              # Độ ưu tiên
    advert_int 1              # Kiểm tra mỗi 1 giây

    authentication {
        auth_type PASS        
        auth_pass 1234        # pass
    }

    virtual_ipaddress {
        192.168.56.100       
    }

    track_script {
        chk_haproxy           # Theo dõi HAProxy trên VM này
    }
}
