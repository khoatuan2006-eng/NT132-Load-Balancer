vrrp_instance VI_1 {       

    state BACKUP              # Máy dự phòng 
    interface enp0s8          # Card mạng

    virtual_router_id 51     
    priority 100              # Độ ưu tiên
    advert_int 1              # Kiểm tra mỗi 1 giây

    authentication {
        auth_type PASS        
        auth_pass 1234        # pass
    }

    virtual_ipaddress {
        192.168.56.100       
    }
}
