# =============================================================================
# HAProxy Configuration — Level 6: Cascading Failure Prevention
# HAProxy version: 2.8.x (Ubuntu 24.04)
# Windows IP: 192.168.20.25
# =============================================================================
# 9 cơ chế chống Cascading Failure:
#   1. Rate Limiting    — stick-table, deny > 100 req/10s
#   2. Maxconn          — maxconn 100 mỗi server
#   3. Timeout          — connect/client/server/queue
#   4. Queue Limit      — timeout queue + maxconn (HAProxy 2.8 không có maxqueue ở backend)
#   5. Circuit Breaker  — fall 3 rise 2
#   6. Retry Control    — retries 2
#   7. Slow Start       — slowstart 30s
#   8. Priority Routing — /stress → stress_backend riêng
#   9. Monitoring       — stats page :8404/stats
# =============================================================================

# -----------------------------------------------------------------------------
# SECTION 1: GLOBAL
# -----------------------------------------------------------------------------
global
    maxconn 2000
    log stdout format raw local0 info

    # Runtime API — Level 7 AI agent dùng để chỉnh weight/maxconn động
    # Chạy lần đầu: sudo mkdir -p /run/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s

# -----------------------------------------------------------------------------
# SECTION 2: DEFAULTS
# -----------------------------------------------------------------------------
defaults
    mode http
    log global
    option httplog
    option dontlognull
    option forwardfor
    option http-server-close

    # Cơ chế 3: Timeout
    timeout connect 5s
    timeout client  10s
    timeout server  10s
    # Cơ chế 4: Queue Limit — request chờ quá 15s trong queue → trả 503
    timeout queue   15s

    # Cơ chế 6: Retry Control — tránh retry storm
    retries 2

# -----------------------------------------------------------------------------
# SECTION 3: FRONTEND — nhận request từ client
# -----------------------------------------------------------------------------
frontend http_front
    bind *:80

    # Cơ chế 1: Rate Limiting — chống DDoS
    stick-table type ip size 1m expire 10s store http_req_rate(10s),conn_cur
    http-request track-sc0 src
    # Chặn IP gửi quá 100 request / 10 giây
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }
    # Chặn IP giữ quá 50 kết nối cùng lúc
    http-request deny deny_status 429 if { sc_conn_cur(0) gt 50 }

    # Cơ chế 8: Priority Routing
    # Request /stress → backend riêng, giới hạn chặt hơn
    acl is_stress path_beg /stress
    use_backend stress_backend if is_stress

    # Mọi request còn lại → backend chính
    default_backend web_backend

# -----------------------------------------------------------------------------
# SECTION 4: BACKEND CHÍNH — xử lý /health, /info, request thường
# -----------------------------------------------------------------------------
backend web_backend
    balance roundrobin

    # Active Health Check
    option httpchk GET /health
    http-check expect status 200

    # Cơ chế 2 + 5 + 7 trên từng server:
    #   maxconn 100   → giới hạn 100 kết nối/server (cơ chế 2)
    #   fall 3        → Circuit Breaker: DOWN sau 3 lần check thất bại (cơ chế 5)
    #   rise 2        → Circuit Breaker: UP sau 2 lần check thành công (cơ chế 5)
    #   slowstart 30s → Slow Start: tăng tải từ từ sau khi phục hồi (cơ chế 7)
    #   inter 3s      → kiểm tra health mỗi 3 giây
    server s1 192.168.20.25:8001 check inter 3s fall 3 rise 2 maxconn 100 slowstart 30s
    server s2 192.168.20.25:8002 check inter 3s fall 3 rise 2 maxconn 100 slowstart 30s
    # backup: chỉ kích hoạt khi s1 VÀ s2 đều DOWN
    server s3 192.168.20.25:8003 check inter 3s fall 3 rise 2 maxconn 100 slowstart 30s backup

# -----------------------------------------------------------------------------
# SECTION 5: BACKEND PHỤ — xử lý /stress (request nặng)
# -----------------------------------------------------------------------------
backend stress_backend
    balance roundrobin

    option httpchk GET /health
    http-check expect status 200

    # Từ chối /stress nếu không còn server nào UP
    acl server_overloaded nbsrv(stress_backend) lt 1
    http-request deny deny_status 503 if server_overloaded

    # maxconn 50 (thay vì 100) → giới hạn chặt hơn cho request nặng
    server s1_stress 192.168.20.25:8001 check inter 3s fall 3 rise 2 maxconn 50 slowstart 30s
    server s2_stress 192.168.20.25:8002 check inter 3s fall 3 rise 2 maxconn 50 slowstart 30s
    server s3_stress 192.168.20.25:8003 check inter 3s fall 3 rise 2 maxconn 50 slowstart 30s backup

# -----------------------------------------------------------------------------
# SECTION 6: STATS PAGE — Cơ chế 9: Monitoring real-time
# Truy cập: http://<IP_VM>:8404/stats   login: admin / admin123
# -----------------------------------------------------------------------------
listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats show-node
    stats auth admin:admin123
    stats admin if TRUE
