# ============================================================
#  HAProxy Config — Level 5 (Docker) + Level 6 + Level 7
#  Level 5: Backend dùng service name Docker (server1:5000)
#  Level 6: Cascading Failure Prevention
#  Level 7: Runtime API (socket) để Python RL agent điều khiển
# ============================================================

global
    log /dev/log local0
    # Stats socket: chỉ dùng khi chạy trực tiếp trên VM (Level 7)
    # Trong Docker (Level 5), bỏ qua — /run/haproxy không có quyền ghi trong Alpine
    # stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    maxconn 2000

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect  5s
    timeout client   30s
    timeout server   30s
    option  http-server-close

# ============================================================
#  Stats Page — Giám sát (Level 3)
#  Truy cập: http://localhost:8404/stats  (admin / admin123)
# ============================================================
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 5s
    stats auth admin:admin123
    stats show-legends
    stats show-node

# ============================================================
#  Frontend — Nhận request từ client
# ============================================================
frontend http_front
    bind *:80
    default_backend flask_servers

    # --- Level 6: Request Priority (ACL) ---
    acl is_stress   path_beg /stress
    acl is_health   path_beg /health
    acl is_info     path_beg /info

    use_backend flask_servers if is_health
    use_backend flask_servers if is_info
    use_backend stress_backend if is_stress
    default_backend flask_servers

# ============================================================
#  Backend chính — Chia tải request thường
#  QUAN TRỌNG (Level 5): Dùng Docker service name, KHÔNG dùng IP
# ============================================================
backend flask_servers
    balance roundrobin
    option  httpchk GET /health
    http-check expect status 200

    # --- Level 6: Maxconn Protection ---
    default-server maxconn 50 check inter 3s fall 3 rise 2

    # Dùng tên service Docker (server1, server2, server3) thay vì localhost/IP
    server s1 server1:5000 weight 10 slowstart 30s
    server s2 server2:5000 weight 10 slowstart 30s
    server s3 server3:5000 weight 10 slowstart 30s

# ============================================================
#  Backend riêng cho /stress — Low Priority
# ============================================================
backend stress_backend
    balance roundrobin
    option  httpchk GET /health
    http-check expect status 200

    # Maxconn thấp hơn — /stress bị từ chối trước
    default-server maxconn 10 check inter 3s fall 3 rise 2

    server s1_stress server1:5000 weight 10 slowstart 30s
    server s2_stress server2:5000 weight 10 slowstart 30s
    server s3_stress server3:5000 weight 10 slowstart 30s
