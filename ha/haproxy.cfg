# ============================================================
#  HAProxy Config — Level 6 + Level 7
#  Level 6: Cascading Failure Prevention
#  Level 7: Runtime API (socket) để Python RL agent điều khiển
# ============================================================

global
    log /dev/log local0
    # --- Level 7: Mở Runtime API socket ---
    # Python agent gửi lệnh điều chỉnh weight qua đây
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    maxconn 2000

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect  5s
    timeout client   30s
    timeout server   30s
    # Khi backend bị đầy maxconn → trả 503 thay vì treo client
    option  http-server-close

# ============================================================
#  Stats Page — Giám sát (Level 3)
#  Truy cập: http://<IP_VM>:8404/stats  (admin / admin123)
# ============================================================
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 5s
    stats auth admin:admin123
    stats show-legends
    stats show-node

# ============================================================
#  Frontend — Nhận request từ client
# ============================================================
frontend http_front
    bind *:80
    default_backend flask_servers

    # --- Level 6: Request Priority (ACL) ---
    # Khi hệ thống bận, ưu tiên /health và /info, drop /stress
    acl is_stress   path_beg /stress
    acl is_health   path_beg /health
    acl is_info     path_beg /info

    # Nếu backend đang quá tải (nbsrv = 0 còn active) → chặn /stress
    # (HAProxy tự động trả 503 khi maxconn bị đầy, ACL này là tầng lọc thêm)
    use_backend flask_servers if is_health
    use_backend flask_servers if is_info
    # /stress chỉ được phục vụ khi hệ thống còn khỏe
    use_backend stress_backend if is_stress
    default_backend flask_servers

# ============================================================
#  Backend chính — Chia tải request thường
# ============================================================
backend flask_servers
    balance roundrobin
    option  httpchk GET /health
    http-check expect status 200

    # --- Level 6: Maxconn Protection ---
    # Mỗi server chỉ chịu tối đa 50 kết nối đồng thời
    # Nếu đầy → HAProxy trả 503 (có kiểm soát), không để server chết
    default-server maxconn 50 check inter 3s fall 3 rise 2

    # Backend chính — AI sẽ điều chỉnh weight từ 0 đến 10
    # Mặc định khởi động: s1 gánh tất cả (night mode), s2 và s3 ngủ đông (weight 0)
    server s1 192.168.56.1:8001 weight 10 slowstart 30s
    server s2 192.168.56.1:8002 weight 0 slowstart 30s
    server s3 192.168.56.1:8003 weight 0 slowstart 30s

# ============================================================
#  Backend riêng cho /stress — Low Priority
#  Nếu server bận → stress request bị drop trước tiên
# ============================================================
backend stress_backend
    balance roundrobin
    option  httpchk GET /health
    http-check expect status 200

    # Maxconn thấp hơn — /stress bị từ chối trước khi /health bị ảnh hưởng
    default-server maxconn 10 check inter 3s fall 3 rise 2

    server s1_stress 192.168.56.1:8001 weight 10 slowstart 30s
    server s2_stress 192.168.56.1:8002 weight 10 slowstart 30s
